<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" style="max-width:600px;width:100%" font-family="sans-serif">
  <!-- Level 0: Full array -->
  <rect x="130" y="15" width="260" height="30" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="260" y="35" text-anchor="middle" font-size="13" fill="#333">8  3  5  1  7  2  6  4</text>

  <!-- Split arrows down -->
  <line x1="220" y1="45" x2="150" y2="75" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="300" y1="45" x2="370" y2="75" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Level 1 -->
  <rect x="70" y="80" width="160" height="28" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="150" y="99" text-anchor="middle" font-size="12" fill="#333">8  3  5  1</text>

  <rect x="290" y="80" width="160" height="28" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="370" y="99" text-anchor="middle" font-size="12" fill="#333">7  2  6  4</text>

  <!-- Split arrows down level 1 -->
  <line x1="120" y1="108" x2="90" y2="135" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="180" y1="108" x2="210" y2="135" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="340" y1="108" x2="310" y2="135" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="400" y1="108" x2="430" y2="135" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Level 2 -->
  <rect x="40" y="140" width="90" height="26" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="85" y="158" text-anchor="middle" font-size="12" fill="#333">8  3</text>

  <rect x="165" y="140" width="90" height="26" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="210" y="158" text-anchor="middle" font-size="12" fill="#333">5  1</text>

  <rect x="265" y="140" width="90" height="26" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="310" y="158" text-anchor="middle" font-size="12" fill="#333">7  2</text>

  <rect x="385" y="140" width="90" height="26" fill="#fff" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="430" y="158" text-anchor="middle" font-size="12" fill="#333">6  4</text>

  <!-- Split to singles -->
  <line x1="65" y1="166" x2="48" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="105" y1="166" x2="118" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="190" y1="166" x2="175" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="230" y1="166" x2="243" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="290" y1="166" x2="278" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="330" y1="166" x2="343" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="410" y1="166" x2="398" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="450" y1="166" x2="463" y2="188" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>

  <!-- Level 3: Singles -->
  <rect x="30" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="46" y="208" text-anchor="middle" font-size="11" fill="#333">8</text>

  <rect x="102" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="118" y="208" text-anchor="middle" font-size="11" fill="#333">3</text>

  <rect x="158" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="174" y="208" text-anchor="middle" font-size="11" fill="#333">5</text>

  <rect x="228" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="244" y="208" text-anchor="middle" font-size="11" fill="#333">1</text>

  <rect x="262" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="278" y="208" text-anchor="middle" font-size="11" fill="#333">7</text>

  <rect x="328" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="344" y="208" text-anchor="middle" font-size="11" fill="#333">2</text>

  <rect x="382" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="398" y="208" text-anchor="middle" font-size="11" fill="#333">6</text>

  <rect x="450" y="192" width="32" height="24" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="466" y="208" text-anchor="middle" font-size="11" fill="#333">4</text>

  <!-- Merge arrows up -->
  <line x1="48" y1="216" x2="68" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="118" y1="216" x2="98" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="174" y1="216" x2="192" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="244" y1="216" x2="224" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="278" y1="216" x2="295" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="344" y1="216" x2="325" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="398" y1="216" x2="415" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="466" y1="216" x2="448" y2="248" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Level 4: Merged pairs -->
  <rect x="45" y="252" width="90" height="26" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="90" y="270" text-anchor="middle" font-size="12" fill="#333">3  8</text>

  <rect x="165" y="252" width="90" height="26" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="210" y="270" text-anchor="middle" font-size="12" fill="#333">1  5</text>

  <rect x="270" y="252" width="90" height="26" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="315" y="270" text-anchor="middle" font-size="12" fill="#333">2  7</text>

  <rect x="390" y="252" width="90" height="26" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="435" y="270" text-anchor="middle" font-size="12" fill="#333">4  6</text>

  <!-- Merge arrows up level 4 to 5 -->
  <line x1="90" y1="278" x2="130" y2="308" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="210" y1="278" x2="175" y2="308" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="315" y1="278" x2="350" y2="308" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="435" y1="278" x2="400" y2="308" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Level 5: Merged quads -->
  <rect x="75" y="312" width="160" height="28" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="155" y="331" text-anchor="middle" font-size="12" fill="#333">1  3  5  8</text>

  <rect x="290" y="312" width="160" height="28" fill="#eaf6ff" stroke="#3498db" stroke-width="1.5" rx="3"/>
  <text x="370" y="331" text-anchor="middle" font-size="12" fill="#333">2  4  6  7</text>

  <!-- Final merge -->
  <line x1="155" y1="340" x2="220" y2="365" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="370" y1="340" x2="300" y2="365" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Level 6: Final sorted -->
  <rect x="130" y="368" width="260" height="30" fill="#eaf6ff" stroke="#3498db" stroke-width="2" rx="3"/>
  <text x="260" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">1  2  3  4  5  6  7  8</text>

  <!-- Side labels -->
  <text x="508" y="110" text-anchor="end" font-size="11" fill="#e74c3c">拆分 ↓</text>
  <text x="508" y="310" text-anchor="end" font-size="11" fill="#3498db">合并 ↑</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#e74c3c" stroke-width="1"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3498db" stroke-width="1"/>
    </marker>
  </defs>
</svg>