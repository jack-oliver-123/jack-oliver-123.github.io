<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="100%" style="max-width:600px">
  <!-- 队列容器 - 水平管道 -->
  <rect x="100" y="50" width="220" height="60" rx="4" fill="none" stroke="#333" stroke-width="2"/>

  <!-- 队列内元素 -->
  <rect x="110" y="60" width="45" height="40" rx="3" fill="#fff" stroke="#3498db" stroke-width="2"/>
  <text x="132" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">A</text>

  <rect x="163" y="60" width="45" height="40" rx="3" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="185" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">B</text>

  <rect x="216" y="60" width="45" height="40" rx="3" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="238" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">C</text>

  <rect x="269" y="60" width="45" height="40" rx="3" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="291" y="85" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">D</text>

  <!-- 入队箭头 (右侧) -->
  <path d="M370,80 L325,80" fill="none" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowRedQ)"/>
  <text x="355" y="60" font-family="sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">入队</text>
  <text x="345" y="75" font-family="sans-serif" font-size="11" fill="#e74c3c">(enqueue)</text>

  <!-- 出队箭头 (左侧) -->
  <path d="M100,80 L50,80" fill="none" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlueQ)"/>
  <text x="45" y="60" font-family="sans-serif" font-size="12" fill="#3498db" font-weight="bold">出队</text>
  <text x="38" y="75" font-family="sans-serif" font-size="11" fill="#3498db">(dequeue)</text>

  <!-- 队头队尾标注 -->
  <text x="132" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3498db">队头(front)</text>
  <text x="291" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e74c3c">队尾(rear)</text>

  <!-- FIFO 标注 -->
  <text x="210" y="148" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">先进先出 (FIFO)</text>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowRedQ" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    </marker>
    <marker id="arrowBlueQ" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3498db" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
