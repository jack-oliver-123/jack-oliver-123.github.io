<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" style="max-width:600px;width:100%" font-family="sans-serif">
  <!-- Title -->
  <text x="300" y="20" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">链表插入操作：在 A 和 B 之间插入 X</text>

  <!-- === Original list (top) === -->
  <text x="30" y="50" font-size="11" fill="#666">插入前：</text>

  <!-- Node A -->
  <g transform="translate(100, 55)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">A</text>
  </g>
  <!-- Arrow A→B -->
  <line x1="170" y1="71" x2="230" y2="71" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node B -->
  <g transform="translate(230, 55)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">B</text>
  </g>
  <!-- Arrow B→C -->
  <line x1="300" y1="71" x2="360" y2="71" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node C -->
  <g transform="translate(360, 55)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">C</text>
  </g>

  <!-- === After insertion (bottom) === -->
  <text x="30" y="140" font-size="11" fill="#666">插入后：</text>

  <!-- Node A -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">A</text>
  </g>

  <!-- Node X (new, highlighted) -->
  <g transform="translate(200, 150)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">X</text>
    <text x="35" y="-6" text-anchor="middle" font-size="10" fill="#e74c3c">新节点</text>
  </g>

  <!-- Node B -->
  <g transform="translate(340, 150)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">B</text>
  </g>

  <!-- Node C -->
  <g transform="translate(470, 150)">
    <rect x="0" y="0" width="70" height="32" fill="#fff" stroke="#333" stroke-width="1.5" rx="2"/>
    <text x="35" y="21" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">C</text>
  </g>

  <!-- Step arrows with red dashed lines and numbered labels -->

  <!-- Step 1: X.next = B -->
  <path d="M 260,182 Q 300,200 340,175" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <circle cx="285" cy="198" r="9" fill="#e74c3c"/>
  <text x="285" y="202" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">1</text>

  <!-- Step 2: X.prev = A -->
  <path d="M 210,182 Q 170,200 130,175" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <circle cx="175" cy="198" r="9" fill="#e74c3c"/>
  <text x="175" y="202" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">2</text>

  <!-- Step 3: A.next = X -->
  <path d="M 130,158 Q 165,145 200,158" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <circle cx="165" cy="145" r="9" fill="#e74c3c"/>
  <text x="165" y="149" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">3</text>

  <!-- Step 4: B.prev = X -->
  <path d="M 340,158 Q 305,145 270,158" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <circle cx="305" cy="145" r="9" fill="#e74c3c"/>
  <text x="305" y="149" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">4</text>

  <!-- Arrow B→C (solid, unchanged) -->
  <line x1="410" y1="166" x2="470" y2="166" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(60, 235)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="28" y="4" font-size="10" fill="#666">指针修改顺序：① X.next=B → ② X.prev=A → ③ A.next=X → ④ B.prev=X</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#333"/>
    </marker>
    <marker id="arrowRed" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>
