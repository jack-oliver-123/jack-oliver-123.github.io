<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" style="max-width:600px">
  <!-- 连接线 -->
  <!-- 根 -> 左子 -->
  <line x1="200" y1="55" x2="120" y2="115" stroke="#333" stroke-width="1.5"/>
  <!-- 根 -> 右子 -->
  <line x1="200" y1="55" x2="280" y2="115" stroke="#333" stroke-width="1.5"/>
  <!-- 左子 -> 左左 -->
  <line x1="120" y1="145" x2="70" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- 左子 -> 左右 -->
  <line x1="120" y1="145" x2="170" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- 右子 -> 右左 -->
  <line x1="280" y1="145" x2="240" y2="205" stroke="#333" stroke-width="1.5"/>
  <!-- 右子 -> 右右 -->
  <line x1="280" y1="145" x2="330" y2="205" stroke="#333" stroke-width="1.5"/>

  <!-- 左子树虚线框 -->
  <rect x="35" y="95" width="170" height="145" rx="6" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="50" y="112" font-family="sans-serif" font-size="11" fill="#3498db">左子树</text>

  <!-- 右子树虚线框 -->
  <rect x="205" y="95" width="160" height="145" rx="6" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="320" y="112" font-family="sans-serif" font-size="11" fill="#e74c3c">右子树</text>

  <!-- 节点 - 根 -->
  <circle cx="200" cy="45" r="22" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">A</text>

  <!-- 根标注 -->
  <text x="233" y="38" font-family="sans-serif" font-size="11" fill="#666">根</text>

  <!-- 节点 - 第二层 -->
  <circle cx="120" cy="135" r="22" fill="#fff" stroke="#3498db" stroke-width="1.8"/>
  <text x="120" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">B</text>

  <circle cx="280" cy="135" r="22" fill="#fff" stroke="#e74c3c" stroke-width="1.8"/>
  <text x="280" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">C</text>

  <!-- 节点 - 第三层 -->
  <circle cx="70" cy="215" r="22" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <text x="70" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">D</text>

  <circle cx="170" cy="215" r="22" fill="#fff" stroke="#3498db" stroke-width="1.5"/>
  <text x="170" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">E</text>

  <circle cx="240" cy="215" r="22" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="240" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">F</text>

  <circle cx="330" cy="215" r="22" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="330" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333">G</text>

  <!-- 层次标注 -->
  <text x="15" y="50" font-family="sans-serif" font-size="11" fill="#666">第 1 层</text>
  <text x="15" y="140" font-family="sans-serif" font-size="11" fill="#666">第 2 层</text>
  <text x="15" y="220" font-family="sans-serif" font-size="11" fill="#666">第 3 层</text>

  <!-- 说明 -->
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">每个节点最多有两个子节点（左孩子、右孩子）</text>
</svg>
